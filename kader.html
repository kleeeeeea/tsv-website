      <div class="container header-inner">
        <a class="brand" href="index.html">
          <img class="brand-mark" src="logo.png?v=20260310b" alt="Logo des TSV Hainsfarth">

    <main>
      <section class="section squad-section">
        <div class="container">
          <div class="section-head">
            <h1 data-team-section-title>Spielerkarten</h1>
            <div class="team-switcher team-switcher-section" data-team-switcher>
              <button class="team-switcher-button is-active" type="button" data-team-key="team1">1. Mannschaft</button>
              <button class="team-switcher-button" type="button" data-team-key="team2">2. Mannschaft</button>
            </div>
          </div>
          <article class="panel squad-panel">
            <div class="squad-filter-row" data-squad-filters>
              <button class="squad-filter is-active" type="button" data-filter="Alle">Alle</button>

        </div>
