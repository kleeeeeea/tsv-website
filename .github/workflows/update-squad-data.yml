name: Update Squad Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  sync-squad-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cutout dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow rembg onnxruntime

      - name: Update FuPa squad snapshot
        run: node scripts/update-squad-data.mjs

      - name: Update FuPa season statistics
        run: node scripts/update-season-stats.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- team-data.js verein.html images/kader/cutouts scripts/generate_player_cutouts.py; then
            echo "No squad, cutout or season statistics changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add team-data.js verein.html images/kader/cutouts scripts/generate_player_cutouts.py
          git commit -m "chore: update FuPa data"
          git push
